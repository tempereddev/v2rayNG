name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Fetch upstream
      run: |
        git remote add upstream https://github.com/2dust/v2rayNG.git || true
        git fetch origin master
        git fetch upstream master --tags

    - name: Prepare sync branch
      run: bash scripts/prepare-upstream-sync.sh master upstream/master automation/upstream-sync

    - name: Commit sync changes
      id: commit_sync
      run: |
        if git diff --quiet master; then
          echo "created=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git add -A
        git commit -m "chore: sync upstream v2rayNG"
        git push --force-with-lease origin automation/upstream-sync
        echo "created=true" >> "$GITHUB_OUTPUT"

    - name: Create or update pull request
      if: steps.commit_sync.outputs.created == 'true'
      run: |
        pr_number="$(gh pr list --base master --head automation/upstream-sync --json number --jq '.[0].number')"
        pr_title="chore: sync upstream v2rayNG"
        pr_body="$(cat <<'EOF'
Automated upstream sync PR.

- rebases the fork onto the latest `upstream/master`
- reapplies fork-specific changes
- bumps the fork release version for the next update check/release
- refreshes the upstream version and commit shown in About
EOF
)"

        if [[ -n "$pr_number" && "$pr_number" != "null" ]]; then
          gh pr edit "$pr_number" --title "$pr_title" --body "$pr_body"
        else
          gh pr create --base master --head automation/upstream-sync --title "$pr_title" --body "$pr_body"
        fi
